{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login – POS System</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
<div class="login-page">
  <div class="login-card">
        <div class="login-brand">
      <div class="login-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:28px;height:28px;stroke:white">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 01-8 0"/>
        </svg>
      </div>
      <div class="login-title">Pos System</div>
      <div class="login-sub">Toko Sumber Rezeki – Sistem Kasir</div>
    </div>
    {% if error %}<div class="login-err">{{ error }}</div>{% endif %}
    {% if messages %}{% for m in messages %}<div class="login-err {% if m.tags == 'success' %}alert-success{% endif %}">{{ m }}</div>{% endfor %}{% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-control" type="text" name="username" placeholder="Masukkan username" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-control" type="password" name="password" placeholder="Masukkan password" required>
      </div>
      <button type="submit" class="btn-login">Masuk</button>
    </form>
  </div>
</div>
<script src="{% static 'js/main.js' %}"></script>
</body>
</html>
